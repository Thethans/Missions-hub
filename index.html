<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fielded — Get to the Field</title>
    <meta
      name="description"
      content="A live map of unreached people groups, a transparent mission-agency matcher, and a pre-field checklist — everything between 'I think I'm called' and getting to the field."
    />
    <meta name="theme-color" content="#16233B" />
    <!--
      The canonical/OG/twitter URLs below are hardcoded, not read from
      VITE_SITE_URL (src/hooks/usePageMeta.js) — index.html isn't processed
      by React, so it can't read a runtime env var, and Vite's HTML env
      substitution has no safe fallback if the var is ever unset, which
      would ship a blank canonical URL. In practice these values are only
      the "before JS runs" state: every real route is prerendered (see
      scripts/prerender.js) and the prerender snapshot overwrites this exact
      file with the real per-page tags from usePageMeta. When the domain
      changes (P3-A), update the 4 URLs below, scripts/prerender.js's own
      matching literal, and public/sitemap.xml (9 occurrences) together —
      grep this repo for "missions-hub.vercel.app" to find all of them.
    -->

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://missions-hub.vercel.app/" />
    <meta property="og:title" content="Fielded — Get to the Field" />
    <meta
      property="og:description"
      content="Find the people still waiting to hear, the agencies who can send you, and everything in between."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://missions-hub.vercel.app/" />
    <meta property="og:image" content="https://missions-hub.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fielded — Get to the Field" />
    <meta
      name="twitter:description"
      content="Find the people still waiting to hear, the agencies who can send you, and everything in between."
    />
    <meta name="twitter:image" content="https://missions-hub.vercel.app/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
